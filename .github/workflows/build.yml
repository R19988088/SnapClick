name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build SnapClick
        run: |
          xcodebuild \
            -project SnapClick.xcodeproj \
            -scheme SnapClick \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Install DMG tooling
        run: python3 -m pip install --user pillow

      - name: Build DMG
        run: |
          scripts/build_dmg.sh build/DerivedData/Build/Products/Release/SnapClick.app

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: SnapClick.dmg
          path: dist/SnapClick.dmg
          if-no-files-found: error
